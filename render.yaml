services:
  - type: web
    name: fitforge-api
    rootDir: server
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fitforge-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 3001
  - type: static
    name: srw-fitzone
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
