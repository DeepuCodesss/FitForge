services:
  - type: web
    name: fitforge-api
    rootDir: server
    env: node
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: fitforge-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: PORT
        value: 3001
databases:
  - name: fitforge-db
    plan: free
    postgresMajorVersion: 16
